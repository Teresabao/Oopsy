<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Quizlet Clone - 学习卡片</title>
    <link rel="stylesheet" href="style.css">
</head>
<div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-logo">📚 Flashcard Pro</div>
            
            <ul class="nav-menu" id="sidebar-menu">
                <li class="nav-item active" onclick="selectSidebarItem('all', '📥 所有卡片')">📥 所有卡片</li>
                </ul>

            <div class="sidebar-footer">
                <button onclick="openCategoryModal()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed #a0aec0; background: transparent; cursor: pointer; color: #4a5568; font-weight: bold;">+ 新建分类/文件夹</button>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="main-header">
                <h2 id="current-view-title">📥 所有卡片</h2>
                <div class="header-actions" style="display: flex; align-items: center; gap: 8px;">
                    <div style="display: flex; align-items: center; background: #edf2f7; padding: 4px 12px; border-radius: 8px; margin-right: 10px;">
                        <span style="font-size: 0.85rem; color: #718096;">本次复习</span>
                        <input type="number" id="study-limit" value="20" min="1" max="200" style="width: 45px; background: transparent; border: none; text-align: center; font-weight: bold; color: #2d3748; outline: none; margin: 0 5px;">
                        <span style="font-size: 0.85rem; color: #718096;">张</span>
                    </div>

                    <button class="start-btn" onclick="openAddCardModal()" style="background: #ffffff; color: #2b6cb0; border: 1px solid #2b6cb0;">➕ 添加</button>
                    <button class="start-btn" onclick="startReciteMode()" style="background: #48bb78; color: white;">▶️ 背诵</button>
                    <button class="start-btn" onclick="startSpellMode()" style="background: #4299e1; color: white;">📝 默写</button>
                </div>
            </header>

            <div class="content-area">
                
                <div id="manage-view" class="view">
                    <div class="toolbar" style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" id="search-input" placeholder="🔍 搜索当前列表中的问题或答案..." onkeyup="filterCards()" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0;">
                        <button onclick="openBatchModal()" style="padding: 0 20px; border-radius: 10px; border: none; background: #ecc94b; font-weight: bold; cursor: pointer;">⚡ 批量导入</button>
                    </div>
                    <div id="flashcards-list" class="cards-grid"></div>
                </div>

                <div id="study-view" class="view hidden">
                    <button onclick="showMainView('manage-view')" style="margin-bottom: 20px; padding: 8px 16px; border-radius: 8px; border:none; cursor:pointer; font-weight: bold; background: #edf2f7; color: #4a5568;">⬅️ 返回卡片列表</button>
                    
                    <div class="study-progress" style="text-align: center; font-weight: bold; color: #4a5568; margin-bottom: 20px;">
                        <span id="study-progress-text"></span>
                        <div style="width: 100%; max-width: 500px; height: 8px; background: #e2e8f0; border-radius: 4px; margin: 10px auto; overflow: hidden;">
                            <div id="progress-bar-fill" style="height: 100%; background: #48bb78; width: 0%; transition: 0.3s;"></div>
                        </div>
                    </div>
                    
                    <div id="study-card" class="study-card" onclick="flipCard()">
                        <div id="card-inner" class="card-inner">
                            <div class="card-front">
                                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                    <h3 id="study-question"></h3>
                                    <button class="speak-btn" onclick="speakWord(document.getElementById('study-question').innerText, event)">🔊</button>
                                </div>
                                <p class="flip-hint">👆 点击空白处翻看答案 (或按空格)</p>
                            </div>
                            <div class="card-back">
                                <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                                    <h3 id="study-answer"></h3>
                                    <button class="speak-btn" onclick="speakWord(document.getElementById('study-answer').innerText, event)">🔊</button>
                                </div>
                                <p class="flip-hint">👆 点击空白处翻回问题</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="study-controls">
                        <button id="study-prev-btn" onclick="prevStudyCard()" style="background: #a0aec0; display: none;">⬅️ 上一张</button>
                        <button onclick="markAsKnown()">已掌握 (数字2)</button>
                        <button onclick="markAsReview()">需要复习 (数字1)</button>
                    </div>
                </div>

                <div id="spell-view" class="view hidden">
                    <button onclick="showMainView('manage-view')" style="margin-bottom: 20px; padding: 8px 16px; border-radius: 8px; border:none; cursor:pointer; font-weight: bold; background: #edf2f7; color: #4a5568;">⬅️ 返回卡片列表</button>
                    
                    <div style="text-align: center; font-weight: bold; color: #4a5568; margin-bottom: 20px;">
                        <span id="spell-progress-text"></span>
                    </div>
                    
                    <div class="spell-card">
                        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                            <h3 id="spell-question"></h3>
                            <button class="speak-btn" onclick="speakWord(document.getElementById('spell-question').innerText, event)">🔊</button>
                        </div>
                        
                        <input type="text" id="spell-input" placeholder="请在此输入答案..." onkeypress="handleSpellEnter(event)" autocomplete="off">
                        <button onclick="checkSpelling()" class="check-btn">提交检验 (Enter)</button>
                        
                        <div id="spell-feedback" class="feedback-text"></div>
                    </div>

                    <div class="study-controls hidden" id="spell-next-control" style="margin-top: 20px;">
                        <button id="spell-prev-btn" onclick="prevSpellCard()" style="background: #a0aec0; margin-right: 15px; display: none;">⬅️ 上一张</button>
                        <button onclick="nextSpellCard()" class="check-btn" style="width: auto;">下一张 ➡️</button>
                    </div>
                </div>

            </div>
        </main>
    </main>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeAllModals()"></div>
    
    <div id="add-card-modal" class="pro-modal">
        <h3>➕ 添加新卡片</h3>
        <select id="modal-category-select" class="form-control"></select>
        <input type="text" id="modal-question" class="form-control" placeholder="输入问题 (如: Apple)">
        <textarea id="modal-answer" class="form-control" placeholder="输入答案 (如: 苹果)" rows="3"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="closeAllModals()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">取消</button>
            <button onclick="createFlashcardFromModal()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #3182ce; color: white; cursor: pointer;">保存卡片</button>
        </div>
    </div>

    <div id="edit-card-modal" class="pro-modal">
        <h3>✏️ 编辑卡片</h3>
        <select id="edit-category-select" class="form-control"></select>
        <input type="text" id="edit-question" class="form-control" placeholder="输入问题">
        <textarea id="edit-answer" class="form-control" placeholder="输入答案" rows="3"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="closeAllModals()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">取消</button>
            <button onclick="updateCard()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #3182ce; color: white; cursor: pointer;">保存修改</button>
        </div>
    </div>

    <div id="category-modal" class="pro-modal">
        <h3>📂 新建分类 / 文件夹</h3>
        <input type="text" id="new-category-input" class="form-control" placeholder="输入名称 (如: 雅思核心词汇)">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="closeAllModals()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">取消</button>
            <button onclick="confirmCategory()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #3182ce; color: white; cursor: pointer;">确定新建</button>
        </div>
    </div>

    <div id="batch-modal" class="pro-modal">
        <h3>⚡ 批量导入卡片</h3>
        <select id="batch-category-select" class="form-control"></select>
        <textarea id="batch-input" class="form-control" rows="5" placeholder="格式支持:&#10;问题 | 答案&#10;Apple | 苹果"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="closeAllModals()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;">取消</button>
            <button onclick="confirmBatchImport()" style="flex: 1; padding: 12px; border-radius: 8px; border: none; background: #ecc94b; color: #1a202c; font-weight: bold; cursor: pointer;">开始导入</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script src="script.js"></script>
</html>
